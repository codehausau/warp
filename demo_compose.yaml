services:
  warp-demo-db:
    image: postgres:16
    profiles: ["warp"]
    environment:
      POSTGRES_PASSWORD: "postgres_password"
    networks:
      - warp-demo-app

  warp-demo-wsgi:
    build: .
    profiles: ["warp"]
    depends_on:
      - warp-demo-db
    environment:
      WARP_DATABASE: "postgresql://postgres:postgres_password@warp-demo-db:5432/postgres"
      WARP_SECRET_KEY: "mysecretkey"
      WARP_DATABASE_INIT_SCRIPT: "[\"sql/schema.sql\",\"sql/sample_data.sql\"]"
      WARP_LANGUAGE_FILE: "i18n/en.js"
      WARP_USE_PROXY_FIX: "true"
    networks:
      - warp-demo-app

  warp-demo-nginx:
    image: nginx
    profiles: ["warp"]
    depends_on:
      - warp-demo-wsgi
    volumes:
      - ./res/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - warp-demo-app
      - warp-demo-proxy

  warp-demo-traefik:
    image: traefik:v3.0
    profiles: ["traefik"]
    command:
      - "--configFile=/etc/traefik/traefik.yaml"
    ports:
      - "8090:80"
      - "8081:8080"
    volumes:
      - ./res/traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - ./res/traefik/dynamic.yaml:/etc/traefik/dynamic.yaml:ro
    networks:
      - warp-demo-proxy

networks:
  warp-demo-app:
    name: warp-demo-app
  warp-demo-proxy:
    name: warp-demo-proxy
